<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DerSchmentor</title>

<style>
:root{
  --bg:#07080b;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.1);
  --text:#f5f7fa;
  --muted:#9aa3af;
  --accent:#ff3b30;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system, sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(255,59,48,0.2), transparent 40%),
    #07080b;
  color:var(--text);
}

/* NAV */
.nav{
  position:sticky;
  top:0;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.6);
  border-bottom:1px solid var(--border);
}

.nav-inner{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px;
}

.nav-links{
  display:flex;
  gap:20px;
}

.btn{
  padding:10px 18px;
  border-radius:999px;
  font-weight:600;
}

.btn-primary{
  background:linear-gradient(135deg,#ff3b30,#ff6a3d);
}

/* MERCH HERO */
.merch{
  max-width:1200px;
  margin:auto;
  padding:60px 20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}

.product-stage{
  position:relative;
  border-radius:25px;
  background:
    radial-gradient(circle at center, rgba(255,59,48,0.25), transparent 50%),
    rgba(255,255,255,0.03);
  border:1px solid var(--border);
  padding:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:500px;
}

/* GLOW */
.product-stage::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,59,48,0.2), transparent 60%);
  filter:blur(40px);
}

/* SLIDER */
.slider img{
  max-height:420px;
  transition:0.4s;
}

.slider img:hover{
  transform:scale(1.05);
}

/* TEXT */
.merch-info h1{
  font-size:3rem;
  margin-bottom:10px;
}

.price{
  font-size:2rem;
  margin:20px 0;
}

/* SIZE BUTTONS */
.sizes{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.size{
  padding:10px 18px;
  border-radius:10px;
  border:1px solid var(--border);
  cursor:pointer;
}

.size.active{
  background:var(--accent);
}

/* LIST */
.features{
  margin:20px 0;
}

.features li{
  margin-bottom:10px;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:15px;
}

/* SOCIALS */
.socials{
  display:flex;
  justify-content:center;
  gap:30px;
  padding:40px;
}

.socials img{
  width:50px;
  transition:0.3s;
}

.socials img:hover{
  transform:scale(1.2);
}

/* VIDEOS */
.videos{
  max-width:1200px;
  margin:auto;
  padding:40px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.video{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
}

.video:hover{
  transform:translateY(-10px);
}

.video img{
  width:100%;
}

/* MOBILE */
@media(max-width:900px){
  .merch{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <b>DerSchmentor</b>
    <div class="nav-links">
      <a>Merch</a>
      <a>Videos</a>
      <a>Socials</a>
      <a class="btn btn-primary">YouTube</a>
    </div>
  </div>
</div>

<!-- MERCH -->
<section class="merch">

  <div class="product-stage">
    <div class="slider">
      <img id="slide" src="bild1.png">
    </div>
  </div>

  <div class="merch-info">
    <h1>DerSchmentor T-Shirt</h1>
    <p>Das offizielle DerSchmentor T-Shirt.</p>

    <div class="price">20,00 €</div>

    <div class="sizes">
      <div class="size active">M</div>
      <div class="size">L</div>
      <div class="size">XL</div>
    </div>

    <ul class="features">
      <li>✔ Schwarzes Shirt mit DerSchmentor Design</li>
      <li>✔ Frontlogo, Backprint und Ärmel-Detail</li>
      <li>✔ 100% Baumwolle</li>
      <li>✔ Direkt zum offiziellen Merch-Kauf</li>
    </ul>

    <div class="actions">
      <button class="btn btn-primary">Jetzt kaufen</button>
      <button class="btn">Fragen</button>
    </div>
  </div>

</section>

<!-- SOCIALS -->
<div class="socials">
  <img src="youtube.png">
  <img src="instagram.png">
  <img src="tiktok.png">
  <img src="twitch.png">
</div>

<!-- VIDEOS -->
<div class="videos">
  <div class="video">
    <img src="https://img.youtube.com/vi/tswCUbfqT6A/maxresdefault.jpg">
  </div>
  <div class="video">
    <img src="https://img.youtube.com/vi/n2Q5lpC0zs0/maxresdefault.jpg">
  </div>
  <div class="video">
    <img src="https://img.youtube.com/vi/hAqAmp6oI64/maxresdefault.jpg">
  </div>
</div>

<script>
// SLIDER
const images = ["bild1.png","bild2.png","bild3.png","bild4.png"];
let i=0;

setInterval(()=>{
  i=(i+1)%images.length;
  document.getElementById("slide").src=images[i];
},3000);

// SIZE SELECT
document.querySelectorAll(".size").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".size").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});
</script>

</body>
</html>
